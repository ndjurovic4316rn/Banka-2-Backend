# Safety cap za spec formulu Random(0, 1440/(volume/remaining)) izmedju fill-ova.
# Obicni orderi se popune za par sekundi; ovo cap-uje slucaj kad je listing
# volume=0 (simulirani podaci ili neaktivna berza).
orders.execution.max-fill-interval-seconds=600

# ============================================================================
# ARBITRO LLM ASISTENT (Celina 6 — Info o predmetu/LLM_Asistent_Plan.txt v3.3)
# ============================================================================
# Default provider je Ollama u Docker network-u (servis "ollama") — pull model-a
# auto-startuje preko `ollama-pull` one-shot kontejnera u docker-compose.
# Za lokalni dev bez Docker-a, override-uj na http://localhost:11434/v1 ili
# http://host.docker.internal:11434/v1 u application-local.properties.
assistant.enabled=true
assistant.name=Arbitro
assistant.provider=ollama
assistant.base-url=http://host.docker.internal:11434/v1
# Pokazuje na derivat modela koji ollama-pull init kontejner kreira sa
# Modelfile PARAMETER num_gpu 999 — forsira sve layer-e u VRAM (8GB)
# umesto 26-30% auto-split-a (3GB) koji je default. Ako derivat ne
# postoji, override-uj na "gemma4:e2b" za fallback. Razlog: Ollama 0.5+
# je uklonio OLLAMA_NUM_GPU env var, jedini nacin za 100% GPU offload
# je preko Modelfile-a ili request options (options.num_gpu=999).
assistant.model=gemma4:e2b-gpu
assistant.api-key=ollama
# v3.5: 2048 → 8192 jer je Luka prijavio "kad dobaci limit dobije se network error".
# Gemma 4 E4B podrzava 128K context window — 8192 je samo response cap, daje detaljnije
# odgovore + agentic preview rezultate. Moze se override-ovati na vise (do 32768) za
# izrazito kompleksne agentic flow-ove.
assistant.max-tokens=8192
# Gemma 4 preporuka iz model card-a: 1.0 / 0.95 / 64 (NE 0.7 kao kod drugih)
assistant.temperature=1.0
assistant.top-p=0.95
assistant.top-k=64
assistant.context-window=32768
assistant.timeout-ms=120000
assistant.rate-limit-per-user-per-min=20
assistant.conversation-retention-days=7
assistant.history-window-size=8
assistant.health-check-interval-seconds=60
# Reasoning (FE NIKAD ne vidi sirov thinking content — Claude Code stil)
assistant.reasoning.enabled=true
assistant.reasoning.heuristic=true
assistant.reasoning.budget-tokens=2048
# Tools
assistant.tools.enabled=true
assistant.tools.max-iterations=5
assistant.tools.wikipedia.url=http://host.docker.internal:8090
assistant.tools.wikipedia.timeout-ms=10000
assistant.tools.rag.url=http://host.docker.internal:8091
assistant.tools.rag.timeout-ms=8000
assistant.tools.calculator.enabled=true
# Phase 5 — Kokoro-82M TTS sidecar (Apache 2.0). Lokalno hostovan na 8092.
assistant.tools.tts.enabled=true
assistant.tools.tts.url=http://host.docker.internal:8092
assistant.tools.tts.timeout-ms=60000
assistant.tools.tts.default-voice=af_bella
assistant.tools.tts.default-lang=en-us
# MVP: 4 interna alata. Phase 2 ce omogucti preostala 3 (vidi plan §10.2).
assistant.tools.internal.balance-summary=true
assistant.tools.internal.recent-orders=true
assistant.tools.internal.exchange-rate=true
assistant.tools.internal.calculator=true
assistant.tools.internal.portfolio-summary=false
assistant.tools.internal.active-otc-offers=false
assistant.tools.internal.loan-summary=false

# Phase 4 v3.5: Agentic mode (write tool-ovi sa preview+confirm flow-om).
# enabled=false prebacuje sistem u read-only — chat ostaje funkcionalan ali
# write handler-i se ne registruju. enabledByDefault=false znaci da svaki
# korisnik mora EXPLICITNO ukljuciti agentic toggle u Arbitro Settings dropdown-u.
assistant.agentic.enabled=true
assistant.agentic.enabled-by-default=false
assistant.agentic.action-ttl-min=5
assistant.agentic.rate-limit-per-min=5
# Cron izraz Spring Scheduler-a — svake minute (0 sekundi, svaki minut)
assistant.agentic.expiration-schedule-cron=0 * * * * *

