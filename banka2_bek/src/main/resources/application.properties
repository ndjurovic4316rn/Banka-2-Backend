spring.application.name=banka2_bek

# Database — sve preko env vars sa dev fallback-ovima radi `mvn spring-boot:run`.
# U produkciji se sva 4 env var-a moraju postaviti (najmanje DB_PASSWORD).
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/banka2}
spring.datasource.username=${DB_USER:banka2user}
spring.datasource.password=${DB_PASSWORD:banka2pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Booleane mapiramo kao INTEGER u bazi (0/1) da seed.sql ostane citljiv
# i izbegnemo eksplozivnu konverziju '0'/'1' -> 'false'/'true' literala.
spring.jpa.properties.hibernate.type.preferred_boolean_jdbc_type=INTEGER

# Server 
server.port=8080

# Mail (override in application-local.properties or env)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# NOTE: In production, externalize secrets (JWT, mail password, API keys) via environment variables or a vault.
# Notification Sender — env vars su MANDATORY u produkciji. Dev fallback se koristi
# samo za lokalni boot (Banka-2-Backend/.env ucitava docker-compose).
spring.mail.username=${MAIL_USERNAME:banka2.notifications@gmail.com}
spring.mail.password=${MAIL_PASSWORD:}

# Notification URLs (for links in emails) — all bases below are frontend origins (frontend routes)
notification.activation-url-base=http://localhost:3000
notification.password-reset-url-base=http://localhost:3000

# Path on frontend for password reset form (placeholder for until front is built);
# reset link = password-reset-url-base + path + ?token=...
notification.password-reset-page-path=/reset-password

# Path for account activation page (link in email = activation-url-base + path + ?token=...).
# Frontend page at this path should submit the token to POST /auth-employee/activate.
notification.activation-page-path=/activate-account

# Fixer.io API key — env override prebrise default. Dev kljuc je rate-limited
# free tier (100 req/mo), sigurno deljiv. Production ide preko ${EXCHANGE_API_KEY}.
exchange.api.key=${EXCHANGE_API_KEY:3c51799c0d1c61334096b3b64d7c7310}
exchange.api.url=https://data.fixer.io/api/latest

# Alpha Vantage API for real stock prices (multiple keys for rate limit rotation).
# Dev set free tier kljuceva sigurno deljiv; production ide preko ${STOCK_API_KEYS}.
stock.api.keys=${STOCK_API_KEYS:7P4ANAS869M38S3B,OF6BVKZOCXWHD9NS,NMBJV9I1JXOWWEZ6,FVHPQRIRKBYHSTJU}
stock.api.url=https://www.alphavantage.co/query

# Bank identification (registration number of the bank's company entity)
bank.registration-number=22200022

# State identification (registration number for tax collection — Republika Srbija)
state.registration-number=17858459

# ============================================================================
# MONITORING / METRIKE (Actuator + Prometheus)
# ============================================================================
# Endpoint-i izlozeni za Prometheus scrape + standardno health/info introspection.
# /actuator/prometheus dolazi u Prometheus exposition formatu, scrape-uje ga
# Prometheus svake 15s. /actuator/health vraca aggregate status svih health
# indicator-a (DB, mail, custom...).
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.endpoint.prometheus.access=read-only

# Application label — sve metrike automatski dobijaju ovaj tag, sto u Grafani
# omogucava grupisanje i alerting po servisu (kasnije kad imamo vise servisa).
management.metrics.tags.application=banka2_backend

# Histogram-i za HTTP request-ove (potrebni za p95/p99 latency dashboard-e i alert-e).
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles.http.server.requests=0.5,0.95,0.99

# ============================================================================
# INFLUXDB (Celina bonus #4 — time-series berzanske OHLCV podatke)
# ============================================================================
# `tick-listings` bucket cuva svaki 15-min snapshot Alpha Vantage-a + sintetizovane
# market-tick podatke. Retention 90 dana (postavlja se na bucket nivou pri kreiranju).
# Production mora setovati ${INFLUX_TOKEN} sa write-access tokenom.
banka2.influx.url=${INFLUX_URL:http://influxdb:8086}
banka2.influx.token=${INFLUX_TOKEN:dev-token-change-me-32-bytes-minimum}
banka2.influx.org=${INFLUX_ORG:banka2}
banka2.influx.bucket=${INFLUX_BUCKET:tick-listings}
banka2.influx.enabled=${INFLUX_ENABLED:false}

# JWT signing key — minimum 256-bit (32 bajta) za HS256.
# U produkciji se MORA postaviti ${JWT_SECRET} (build pada bez njega zbog
# Keys.hmacShaKeyFor validacije). Dev fallback je 60 bajta (480-bit) i koristi
# se samo lokalno; nikada ne sme biti pushovan u javni env. Rotacija: setujemo
# nov secret, restartujemo BE — svi postojeci JWT-ovi se invalidiraju.
jwt.secret=${JWT_SECRET:dev-only-jwt-secret-do-not-use-in-prod-rotate-via-env-var-on-each-deploy}

# OTP configuration
otp.expiry-minutes=5
otp.max-attempts=3

# Phase 6: order execution tuning za demo
# (60s initial delay da rezervacija bude vidljiva pre prvog fill pokusaja)
orders.execution.initial-delay-seconds=60
# After-hours nalozi (do 4h od zatvaranja berze) cekaju dodatnih 30 min po svakom
# fill-u, po spec-u. Za demo sme da se smanji npr. na 60 u dev profilu.
orders.afterhours.delay-seconds=1800
# Safety cap za spec formulu Random(0, 1440/(volume/remaining)) izmedju fill-ova.
# Obicni orderi se popune za par sekundi; ovo cap-uje slucaj kad je listing
# volume=0 (simulirani podaci ili neaktivna berza).
orders.execution.max-fill-interval-seconds=600

# ============================================================================
# ARBITRO LLM ASISTENT (Celina 6 — Info o predmetu/LLM_Asistent_Plan.txt v3.3)
# ============================================================================
# Default provider je Ollama u Docker network-u (servis "ollama") — pull model-a
# auto-startuje preko `ollama-pull` one-shot kontejnera u docker-compose.
# Za lokalni dev bez Docker-a, override-uj na http://localhost:11434/v1 ili
# http://host.docker.internal:11434/v1 u application-local.properties.
assistant.enabled=true
assistant.name=Arbitro
assistant.provider=ollama
assistant.base-url=http://host.docker.internal:11434/v1
# Pokazuje na derivat modela koji ollama-pull init kontejner kreira sa
# Modelfile PARAMETER num_gpu 999 — forsira sve layer-e u VRAM (8GB)
# umesto 26-30% auto-split-a (3GB) koji je default. Ako derivat ne
# postoji, override-uj na "gemma4:e2b" za fallback. Razlog: Ollama 0.5+
# je uklonio OLLAMA_NUM_GPU env var, jedini nacin za 100% GPU offload
# je preko Modelfile-a ili request options (options.num_gpu=999).
assistant.model=gemma4:e2b-gpu
assistant.api-key=ollama
# v3.5: 2048 → 8192 jer je Luka prijavio "kad dobaci limit dobije se network error".
# Gemma 4 E4B podrzava 128K context window — 8192 je samo response cap, daje detaljnije
# odgovore + agentic preview rezultate. Moze se override-ovati na vise (do 32768) za
# izrazito kompleksne agentic flow-ove.
assistant.max-tokens=8192
# Gemma 4 preporuka iz model card-a: 1.0 / 0.95 / 64 (NE 0.7 kao kod drugih)
assistant.temperature=1.0
assistant.top-p=0.95
assistant.top-k=64
assistant.context-window=32768
assistant.timeout-ms=120000
assistant.rate-limit-per-user-per-min=20
assistant.conversation-retention-days=7
assistant.history-window-size=8
assistant.health-check-interval-seconds=60
# Reasoning (FE NIKAD ne vidi sirov thinking content — Claude Code stil)
assistant.reasoning.enabled=true
assistant.reasoning.heuristic=true
assistant.reasoning.budget-tokens=2048
# Tools
assistant.tools.enabled=true
assistant.tools.max-iterations=5
assistant.tools.wikipedia.url=http://host.docker.internal:8090
assistant.tools.wikipedia.timeout-ms=10000
assistant.tools.rag.url=http://host.docker.internal:8091
assistant.tools.rag.timeout-ms=8000
assistant.tools.calculator.enabled=true
# Phase 5 — Kokoro-82M TTS sidecar (Apache 2.0). Lokalno hostovan na 8092.
assistant.tools.tts.enabled=true
assistant.tools.tts.url=http://host.docker.internal:8092
assistant.tools.tts.timeout-ms=60000
assistant.tools.tts.default-voice=af_bella
assistant.tools.tts.default-lang=en-us
# MVP: 4 interna alata. Phase 2 ce omogucti preostala 3 (vidi plan §10.2).
assistant.tools.internal.balance-summary=true
assistant.tools.internal.recent-orders=true
assistant.tools.internal.exchange-rate=true
assistant.tools.internal.calculator=true
assistant.tools.internal.portfolio-summary=false
assistant.tools.internal.active-otc-offers=false
assistant.tools.internal.loan-summary=false

# Phase 4 v3.5: Agentic mode (write tool-ovi sa preview+confirm flow-om).
# enabled=false prebacuje sistem u read-only — chat ostaje funkcionalan ali
# write handler-i se ne registruju. enabledByDefault=false znaci da svaki
# korisnik mora EXPLICITNO ukljuciti agentic toggle u Arbitro Settings dropdown-u.
assistant.agentic.enabled=true
assistant.agentic.enabled-by-default=false
assistant.agentic.action-ttl-min=5
assistant.agentic.rate-limit-per-min=5
# Cron izraz Spring Scheduler-a — svake minute (0 sekundi, svaki minut)
assistant.agentic.expiration-schedule-cron=0 * * * * *

# ============================================================================
# INTER-BANK ROUTING (Celina 5 — T6 BankRoutingService + InterbankAuthFilter)
# ============================================================================
# Routing number = prve 3 cifre svakog naseg racuna. Mi smo 222.
interbank.my-routing-number=222
interbank.my-bank-display-name=Banka 2

# Partner banka #1 (Tim 1). Routing 111.
# Konfiguracija mora biti uskladjena sa Tim 1 — kontakt: zajednicki Discord/Teams.
interbank.partners[0].routing-number=${PARTNER1_ROUTING:111}
interbank.partners[0].display-name=${PARTNER1_NAME:Banka 1}
# Base URL ka Tim 1 BE-u. Mora se zavrsavati sa "/".
interbank.partners[0].base-url=${PARTNER1_BASE_URL:http://localhost:9999/}
# Inbound token: token koji MI izdajemo Tim 1; oni ga saalju u X-Api-Key kad nas zovu.
# Tim 1 u svom outbound-token = "dev-outbound-banka1-to-banka2" — to oni saljali nama.
interbank.partners[0].inbound-token=${PARTNER1_INBOUND_TOKEN:dev-outbound-banka1-to-banka2}
# Outbound token: token koji Tim 1 izdaje nama; MI saljemo u X-Api-Key kad ih zovemo.
# Tim 1 u svom inbound-token = "dev-inbound-banka2-to-banka1" — to oni ocekuju od nas.
interbank.partners[0].outbound-token=${PARTNER1_OUTBOUND_TOKEN:dev-inbound-banka2-to-banka1}
# §3.7 path override: spec kaze "/user/{rn}/{id}" ali Tim 1 je rerouted-ovao
# endpoint na "/interbank/user/{rn}/{id}" zbog internih path collision-a sa svojom
# frontend /user/* rutom. Override po partneru — bez ovog, dobijali bismo 404 pri
# user info lookup-u (verifikovano kroz audit njihovog UserDisplayController.java).
interbank.partners[0].user-info-path=${PARTNER1_USER_PATH:/interbank/user/{rn}/{id}}

# ============================================================================
# BANK AS A CLIENT (T12 — Celina 4 (Nova) Napomena 1+2)
# ============================================================================
# Banka kao entitet investira u sopstvene fondove preko "vlasnik banke"
# klijenta. ClientFundPosition koristi userRole='CLIENT' i userId =
# bank.owner-client-id pri tracking-u banke kao investitora.
#
# Vrednost je client.id reda iz `clients` tabele koji predstavlja banku.
# Seed.sql kreira klijenta sa email='banka2.doo@banka.rs'; kao fallback,
# InvestmentFundService.listBankPositions koristi taj email lookup ako
# property nije postavljen (omogucava da seed bira id, jer GENERATED).
#
# U produkciji moze se eksplicitno setovati pre boot-a:
#   bank.owner-client-id=5
bank.owner-client-email=banka2.doo@banka.rs
