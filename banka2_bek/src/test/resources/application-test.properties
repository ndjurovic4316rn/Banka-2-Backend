spring.datasource.url=jdbc:h2:mem:banka2_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.type.preferred_boolean_jdbc_type=INTEGER

spring.mail.host=localhost
spring.mail.port=2525
spring.mail.username=test@localhost
spring.mail.password=test

notification.activation-url-base=http://localhost:3000
notification.password-reset-url-base=http://localhost:3000
notification.password-reset-page-path=/reset-password
notification.activation-page-path=/activate-account

bank.registration-number=22200022
exchange.api.key=test
exchange.api.url=http://localhost
stock.api.keys=test-key-1,test-key-2



interbank.my-routing-number=222
interbank.partners[0].routing-number=999
interbank.partners[0].base-url=http://localhost:9999/
interbank.partners[0].inbound-token=test-key-dummy

# Rate limit override za integration testove — production default je 10/min
# (defense protiv brute-force), ali @SpringBootTest klase ispaljuju 100+ POST-ova
# prema /auth/login i /auth/password_reset/request u sekundi. Visoki capacity
# u testovima mu omogucava da se ponasa kao "off" bez specijalnog disabling-a.
auth.rate-limit.capacity=100000

# JWT secret za testove (dovoljno dugacak za HS256 — minimum 32 bajta).
# Production setuje preko ${JWT_SECRET}.
jwt.secret=test-jwt-secret-do-not-use-in-prod-32-bytes-minimum-required-for-hs256

# JPA dialect override za H2 u test profilu — application.properties default je
# PostgreSQLDialect ali H2 mode=PostgreSQL handluje vecinu syntax-e.
spring.jpa.properties.hibernate.preferred_boolean_jdbc_type=INTEGER

# ClientBootstrapRunner (production: kreira nedostajuce Client+racun za
# registrovane korisnike) u test profilu iskljucujemo da @SpringBootTest
# klase same kontrolisu state baze (inace bi bootstrap kreirao racune i
# ranjivao H2 setup za testove koji ocekuju cisto stanje).
banka2.bootstrap.client-migration.enabled=false