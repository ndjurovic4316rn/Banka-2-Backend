name: backend-cd

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/banka2-backend

jobs:
  docker-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Convert repository owner to lowercase
        id: string
        run: echo "lowercase=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./banka2_bek
          file: ./banka2_bek/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.string.outputs.lowercase }}/banka2-backend:latest
            ghcr.io/${{ steps.string.outputs.lowercase }}/banka2-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
