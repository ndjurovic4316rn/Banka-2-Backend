name: backend-cd

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  # ============================================================
  # Glavni BE image (Spring Boot + Java 25)
  # ============================================================
  backend:
    name: Build & Push banka2-backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Convert repository owner to lowercase
        id: string
        run: echo "lowercase=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./banka2_bek
          file: ./banka2_bek/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.string.outputs.lowercase }}/banka2-backend:latest
            ghcr.io/${{ steps.string.outputs.lowercase }}/banka2-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  # ============================================================
  # Banka-2-Tools sidecari (Arbitro AI bonus stack)
  # 3 custom image-a koja gradimo: rag-tool, wikipedia-tool, kokoro-tts.
  # Ollama image je `ollama/ollama:latest` (Dockerhub) — ne build-ujemo.
  # ============================================================
  tools:
    name: Build & Push ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: banka2-rag-tool
            context: ./Banka-2-Tools/rag-service
          - image: banka2-wikipedia-tool
            context: ./Banka-2-Tools/wikipedia-service
          - image: banka2-kokoro-tts
            context: ./Banka-2-Tools/kokoro-tts
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Convert repository owner to lowercase
        id: string
        run: echo "lowercase=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ghcr.io/${{ steps.string.outputs.lowercase }}/${{ matrix.image }}:latest
            ghcr.io/${{ steps.string.outputs.lowercase }}/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  # ============================================================
  # Ollama pre-baked sa Gemma 4 E2B + derived gemma4:e2b-gpu (num_gpu=999)
  # Image se gradi iz `Banka-2-Tools/ollama/Dockerfile` koji pull-uje
  # model TOKOM build-a i kreira derived varijantu. Idiot-proof: korisnik
  # `docker compose pull && up -d` dobija odmah upotrebljiv LLM.
  # ============================================================
  ollama:
    name: Build & Push banka2-ollama (pre-baked Gemma)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Free up disk space (image je ~10GB unpacked)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          docker image prune -af
          df -h /

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Convert repository owner to lowercase
        id: string
        run: echo "lowercase=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push (Dockerfile pull-uje + create derived model unutra)
        uses: docker/build-push-action@v6
        with:
          context: ./Banka-2-Tools/ollama
          push: true
          tags: |
            ghcr.io/${{ steps.string.outputs.lowercase }}/banka2-ollama:latest
            ghcr.io/${{ steps.string.outputs.lowercase }}/banka2-ollama:${{ github.sha }}
          # Cache se NE koristi za ollama — model layer je 7GB i GHA cache
          # ima 10GB limit; brzo ga popunis i nemas mesta za druge layer-e.
          # Build je dugacak (~10-15min) ali ide jednom po push-u na main.

  # ============================================================
  # Monitoring stack (MLA bonus)
  # 1 custom image: alert-router. Prometheus, Grafana, AlertManager su
  # javni image-i sa Dockerhub-a (`prom/prometheus`, `grafana/grafana`,
  # `prom/alertmanager`). NAPOMENA: alert-router build context je
  # `Banka-2-Tools/alert-router-service` (re-use sidecar layout iz Tools-a).
  # ============================================================
  monitoring:
    name: Build & Push banka2-alert-router
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Convert repository owner to lowercase
        id: string
        run: echo "lowercase=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./Banka-2-Tools/alert-router-service
          push: true
          tags: |
            ghcr.io/${{ steps.string.outputs.lowercase }}/banka2-alert-router:latest
            ghcr.io/${{ steps.string.outputs.lowercase }}/banka2-alert-router:${{ github.sha }}
          cache-from: type=gha,scope=alert-router
          cache-to: type=gha,mode=max,scope=alert-router
